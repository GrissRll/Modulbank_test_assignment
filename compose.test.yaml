name: modulbank-test-assignment-test

services:
  postgres-test:
    image: postgres:18-alpine
    container_name: payment-postgres-test

    environment:
      POSTGRES_DB: payment_test
      POSTGRES_USER: payment_user
      POSTGRES_PASSWORD: payment_pass

    ports:
      - "${POSTGRES_PORT}:5432"


    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U payment_user -d payment_test" ]
      interval: 2s
      timeout: 3s
      retries: 10

    tmpfs:
      - /var/lib/postgresql

  tests:
    build:
      context: .
      target: development
    command: ["pytest", "-v"]

    environment:
      TEST_DATABASE_URL: postgresql+asyncpg://payment_user:payment_pass@postgres-test:5432/payment_test
      DATABASE_URL: postgresql+asyncpg://payment_user:payment_pass@postgres-test:5432/payment_test
      PROVIDER_URL: http://provider-test:8081

    depends_on:
      postgres-test:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./tests:/app/tests
      - ./conftest.py:/app/conftest.py
      - ./pytest.ini:/app/pytest.ini



